<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="今天吃什么">
<meta name="theme-color" content="#FFF8F0">
<title>今天吃什么 🍱</title>
<style>
:root{
  --bg:#FFF8F0; --card:#FFFFFF; --accent:#FF8A5C; --accent2:#FFB347;
  --text:#4A3B32; --sub:#9C8A7E; --line:#F3E7DB; --danger:#E05656;
  --chip:#FFF1E6; --chip-on:#FF8A5C;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;font-size:16px;}
body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}
header{padding:calc(14px + env(safe-area-inset-top)) 20px 6px;display:flex;align-items:baseline;justify-content:space-between;}
header h1{font-size:22px;margin:0;}
header .count{font-size:13px;color:var(--sub);}
main{padding:8px 16px 16px;max-width:560px;margin:0 auto;}
section{display:none;}
section.on{display:block;animation:fade .2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---- 通用组件 ---- */
.card{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(180,140,100,.08);margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:7px 14px;border-radius:999px;background:var(--chip);color:var(--text);
  font-size:14px;border:1.5px solid transparent;cursor:pointer;user-select:none;}
.chip.on{background:var(--chip-on);color:#fff;font-weight:600;}
.chip.add{border:1.5px dashed #E8CDB6;background:transparent;color:var(--sub);}
.btn{display:block;width:100%;border:none;border-radius:16px;padding:15px;font-size:17px;font-weight:700;
  cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));}
.btn.ghost{background:var(--chip);color:var(--accent);}
.btn.small{padding:10px;font-size:15px;border-radius:12px;}
.btn:active{transform:scale(.98);}
.row2{display:flex;gap:10px;}
.row2>*{flex:1;}
label.fl{display:block;font-size:13px;color:var(--sub);margin:14px 0 6px;}
input[type=text],textarea,select{width:100%;border:1.5px solid var(--line);border-radius:12px;
  padding:11px 12px;font-size:16px;background:#fff;color:var(--text);outline:none;font-family:inherit;}
input:focus,textarea:focus{border-color:var(--accent2);}
.muted{color:var(--sub);font-size:13px;}
.banner{background:#FFF3D6;border-radius:14px;padding:10px 14px;font-size:13.5px;color:#8A6D2F;
  margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.banner button{border:none;background:#FFD166;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;color:#6B4F00;}
.empty{text-align:center;color:var(--sub);padding:36px 10px;font-size:14.5px;line-height:1.9;}
.empty .big{font-size:40px;}

/* ---- 抽签 ---- */
#pickBtn{margin-top:4px;padding:22px;font-size:21px;border-radius:22px;box-shadow:0 6px 18px rgba(255,138,92,.35);}
.result{text-align:center;padding:26px 16px;}
.result .emoji{font-size:54px;animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(.3)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.result h2{margin:10px 0 4px;font-size:26px;}
.result .src{color:var(--sub);font-size:15px;}
.result .tags{margin-top:10px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.result .tags span{background:var(--chip);border-radius:999px;padding:4px 10px;font-size:12.5px;color:#B07B4F;}
.result .note{margin-top:10px;font-size:14px;color:var(--sub);}
.opt{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--sub);margin-top:12px;}
.opt input{width:18px;height:18px;accent-color:var(--accent);}

/* ---- 清单 ---- */
.group-t{font-size:14px;color:var(--sub);margin:16px 4px 8px;font-weight:600;}
.item{background:var(--card);border-radius:16px;padding:13px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px rgba(180,140,100,.07);}
.item .info{flex:1;min-width:0;}
.item .nm{font-weight:600;font-size:16px;}
.item .sb{font-size:13px;color:var(--sub);margin-top:2px;}
.item .tg{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;}
.item .tg span{background:var(--chip);border-radius:999px;padding:2px 8px;font-size:11.5px;color:#B07B4F;}
.item .del{border:none;background:none;color:#D9C2B0;font-size:18px;padding:6px;}

/* ---- 设置 ---- */
.set-row{display:flex;justify-content:space-between;align-items:center;padding:13px 2px;border-bottom:1px solid var(--line);font-size:15px;}
.set-row:last-child{border-bottom:none;}
.hist li{font-size:14px;color:var(--sub);padding:6px 0;list-style:none;}
.hist{padding:0;margin:6px 0 0;}
.danger{color:var(--danger);}

/* ---- 底部导航 ---- */
nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:10;}
nav button{flex:1;border:none;background:none;padding:9px 0 7px;font-size:11px;color:var(--sub);cursor:pointer;}
nav button .ic{display:block;font-size:21px;margin-bottom:2px;filter:grayscale(1);opacity:.55;}
nav button.on{color:var(--accent);font-weight:700;}
nav button.on .ic{filter:none;opacity:1;}

/* 撒花 */
.confetti{position:fixed;font-size:24px;z-index:99;pointer-events:none;animation:fall 1.3s ease-in forwards;}
@keyframes fall{to{transform:translateY(85vh) rotate(360deg);opacity:0;}}
dialog{border:none;border-radius:18px;padding:20px;max-width:320px;width:86%;}
dialog::backdrop{background:rgba(0,0,0,.3);}
</style>
</head>
<body>
<header><h1 id="pageTitle">今天吃什么 🍱</h1><span class="count" id="countTip"></span></header>
<main>

<!-- 抽签 -->
<section id="v-pick" class="on">
  <div id="backupBanner" class="banner" style="display:none">
    <span id="backupBannerText"></span><button onclick="go('set')">去备份</button>
  </div>
  <div class="card">
    <div class="muted" style="margin-bottom:8px">想吃哪类？（不选 = 全部）</div>
    <div class="chips" id="pickCats"></div>
    <div class="muted" style="margin:14px 0 8px">现在的心情？（可多选）</div>
    <div class="chips" id="pickTags"></div>
    <label class="opt"><input type="checkbox" id="skipRecent" checked>避开最近 3 天吃过的</label>
  </div>
  <button class="btn" id="pickBtn" onclick="doPick()">今天吃什么 🎲</button>
  <div class="card result" id="resultCard" style="display:none">
    <div class="emoji" id="rEmoji"></div>
    <h2 id="rName"></h2>
    <div class="src" id="rSrc"></div>
    <div class="tags" id="rTags"></div>
    <div class="note" id="rNote"></div>
    <div class="row2" style="margin-top:18px">
      <button class="btn ghost small" onclick="doPick(true)">换一个 🔄</button>
      <button class="btn small" onclick="acceptPick()">就它了 🎉</button>
    </div>
  </div>
</section>

<!-- 清单 -->
<section id="v-list">
  <input type="text" id="searchBox" placeholder="🔍 搜索名称 / 店名 / 牌子…" oninput="renderList()" style="margin-bottom:4px">
  <div class="chips" id="listTagFilter" style="margin:10px 0 2px"></div>
  <div id="listBody"></div>
</section>

<!-- 添加 / 编辑 -->
<section id="v-add">
  <div class="card">
    <label class="fl">名称 *</label>
    <input type="text" id="fName" placeholder="如：辣子鸡 / 乐事黄瓜味薯片">
    <label class="fl">分类</label>
    <div class="chips" id="fCats"></div>
    <label class="fl" id="fSrcLabel">店名 / 牌子</label>
    <input type="text" id="fSrc" placeholder="如：川香居 / 乐事">
    <label class="fl">标签（可多选）</label>
    <div class="chips" id="fTags"></div>
    <label class="fl">备注（可选）</label>
    <textarea id="fNote" rows="2" placeholder="价格、地址、口味提醒…"></textarea>
  </div>
  <button class="btn" onclick="saveItem()" id="saveBtn">保存 ✓</button>
  <button class="btn ghost small" id="cancelEditBtn" style="display:none;margin-top:10px" onclick="resetForm();go('list')">取消编辑</button>
</section>

<!-- 设置 / 备份 -->
<section id="v-set">
  <div class="card">
    <div style="font-weight:700;margin-bottom:4px">📦 数据备份</div>
    <div class="muted" style="margin-bottom:14px">点「下载备份」后选「存储到文件」→ iCloud 云盘。数据丢失或换手机时，用「导入备份」恢复。</div>
    <div class="row2">
      <button class="btn small" onclick="exportData()">⬇️ 下载备份</button>
      <button class="btn ghost small" onclick="document.getElementById('importFile').click()">⬆️ 导入备份</button>
    </div>
    <input type="file" id="importFile" accept=".json,application/json,text/plain" style="display:none" onchange="importData(this)">
    <div class="muted" style="margin-top:12px" id="lastBackupTip"></div>
  </div>
  <div class="card">
    <div style="font-weight:700">🍽️ 最近吃过</div>
    <ul class="hist" id="histList"></ul>
    <button class="btn ghost small" style="margin-top:10px" onclick="clearHistory()">清空历史</button>
  </div>
  <div class="card">
    <div class="set-row"><span>清单条目</span><span class="muted" id="statItems"></span></div>
    <div class="set-row"><span class="danger" onclick="wipeAll()" style="cursor:pointer">⚠️ 清空所有数据</span></div>
  </div>
  <div class="muted" style="text-align:center;margin-top:6px">数据保存在本机浏览器中 · 记得定期备份哦</div>
</section>
</main>

<nav>
  <button id="nav-pick" class="on" onclick="go('pick')"><span class="ic">🎲</span>抽签</button>
  <button id="nav-list" onclick="go('list')"><span class="ic">📋</span>清单</button>
  <button id="nav-add" onclick="go('add')"><span class="ic">➕</span>添加</button>
  <button id="nav-set" onclick="go('set')"><span class="ic">⚙️</span>备份</button>
</nav>

<script>
'use strict';
var KEY='eatwhat_v1';
var CAT_EMOJI={'正餐':'🍛','零食':'🍿','饮品':'🧋','甜品':'🍰'};
var state=load();
var currentPick=null, editingId=null;
var fSel={cat:'正餐',tags:[]};
var pickSel={cats:[],tags:[]};
var listTagSel=null;

function load(){
  var def={cats:['正餐','零食','饮品','甜品'],
    tags:['没胃口','想吃辣','想吃甜的','想吃清淡','犒劳自己','快速解决'],
    items:[
      {id:uid(),name:'辣子鸡',cat:'正餐',src:'示例 · 可删除',tags:['没胃口','想吃辣'],note:'',at:Date.now()},
      {id:uid(),name:'提拉米苏',cat:'甜品',src:'示例 · 可删除',tags:['想吃甜的','犒劳自己'],note:'',at:Date.now()}
    ],
    history:[],lastBackup:null};
  try{
    var raw=localStorage.getItem(KEY);
    if(!raw) return def;
    var d=JSON.parse(raw);
    if(!d||!Array.isArray(d.items)) return def;
    d.cats=d.cats&&d.cats.length?d.cats:def.cats;
    d.tags=d.tags||def.tags;
    d.history=d.history||[];
    return d;
  }catch(e){return def;}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){alert('保存失败：存储空间可能已满');}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function emojiOf(cat){return CAT_EMOJI[cat]||'🍽️';}

/* ---------- 导航 ---------- */
function go(v){
  ['pick','list','add','set'].forEach(function(k){
    document.getElementById('v-'+k).classList.toggle('on',k===v);
    document.getElementById('nav-'+k).classList.toggle('on',k===v);
  });
  if(v==='list') renderList();
  if(v==='add'&&!editingId) renderForm();
  if(v==='set') renderSet();
  if(v==='pick') renderPick();
  window.scrollTo(0,0);
}

/* ---------- 抽签 ---------- */
function renderPick(){
  var pc=document.getElementById('pickCats');
  pc.innerHTML=state.cats.map(function(c){
    return '<span class="chip'+(pickSel.cats.indexOf(c)>=0?' on':'')+'" onclick="togglePick(\'cats\',\''+esc(c)+'\')">'+emojiOf(c)+' '+esc(c)+'</span>';
  }).join('');
  var pt=document.getElementById('pickTags');
  pt.innerHTML=state.tags.map(function(t){
    return '<span class="chip'+(pickSel.tags.indexOf(t)>=0?' on':'')+'" onclick="togglePick(\'tags\',\''+esc(t)+'\')">'+esc(t)+'</span>';
  }).join('');
  document.getElementById('countTip').textContent=state.items.length?('已收藏 '+state.items.length+' 样'):'';
  var b=document.getElementById('backupBanner');
  var days=state.lastBackup?Math.floor((Date.now()-state.lastBackup)/864e5):null;
  if(state.items.length>3&&(days===null||days>=7)){
    document.getElementById('backupBannerText').textContent=days===null?'💡 还没备份过，建议备份一次到 iCloud':('💡 距上次备份已 '+days+' 天啦');
    b.style.display='flex';
  }else b.style.display='none';
}
function togglePick(kind,val){
  var arr=pickSel[kind],i=arr.indexOf(val);
  if(i>=0)arr.splice(i,1);else arr.push(val);
  renderPick();
}
function poolOf(){
  var skipIds=[];
  if(document.getElementById('skipRecent').checked){
    var cut=Date.now()-3*864e5;
    state.history.forEach(function(h){if(h.at>cut)skipIds.push(h.itemId);});
  }
  var pool=state.items.filter(function(it){
    if(pickSel.cats.length&&pickSel.cats.indexOf(it.cat)<0)return false;
    if(pickSel.tags.length&&!pickSel.tags.some(function(t){return (it.tags||[]).indexOf(t)>=0}))return false;
    return true;
  });
  var fresh=pool.filter(function(it){return skipIds.indexOf(it.id)<0;});
  return fresh.length?fresh:pool;
}
function doPick(reroll){
  var pool=poolOf();
  if(!pool.length){alert('清单里还没有符合条件的吃的，先去「添加」几个吧～');return;}
  if(reroll&&pool.length>1&&currentPick){pool=pool.filter(function(it){return it.id!==currentPick.id;});}
  currentPick=pool[Math.floor(Math.random()*pool.length)];
  var c=document.getElementById('resultCard');
  c.style.display='block';
  document.getElementById('rEmoji').textContent=emojiOf(currentPick.cat);
  var e=document.getElementById('rEmoji');e.style.animation='none';void e.offsetWidth;e.style.animation='';
  document.getElementById('rName').textContent=currentPick.name;
  document.getElementById('rSrc').textContent=currentPick.src?(currentPick.cat+' · '+currentPick.src):currentPick.cat;
  document.getElementById('rTags').innerHTML=(currentPick.tags||[]).map(function(t){return '<span>'+esc(t)+'</span>';}).join('');
  document.getElementById('rNote').textContent=currentPick.note||'';
  c.scrollIntoView({behavior:'smooth',block:'center'});
}
function acceptPick(){
  if(!currentPick)return;
  state.history.unshift({itemId:currentPick.id,name:currentPick.name,at:Date.now()});
  if(state.history.length>100)state.history.length=100;
  save();confetti();
  document.getElementById('rNote').textContent='已记录～祝好胃口！😋';
}
function confetti(){
  var ems=['🎉','✨','🍀','💛','🌟'];
  for(var i=0;i<14;i++){
    var s=document.createElement('span');
    s.className='confetti';s.textContent=ems[i%ems.length];
    s.style.left=(5+Math.random()*90)+'vw';s.style.top='-30px';
    s.style.animationDelay=(Math.random()*.4)+'s';
    document.body.appendChild(s);
    setTimeout(function(el){return function(){el.remove();};}(s),1800);
  }
}

/* ---------- 清单 ---------- */
function renderList(){
  var q=document.getElementById('searchBox').value.trim().toLowerCase();
  var tf=document.getElementById('listTagFilter');
  tf.innerHTML=state.tags.map(function(t){
    return '<span class="chip'+(listTagSel===t?' on':'')+'" onclick="filterTag(\''+esc(t)+'\')">'+esc(t)+'</span>';
  }).join('');
  var body=document.getElementById('listBody');
  var items=state.items.filter(function(it){
    if(q&&(it.name+' '+(it.src||'')).toLowerCase().indexOf(q)<0)return false;
    if(listTagSel&&(it.tags||[]).indexOf(listTagSel)<0)return false;
    return true;
  });
  if(!items.length){
    body.innerHTML='<div class="empty"><div class="big">🥡</div>'+(state.items.length?'没有匹配的结果':'清单还是空的<br>点下方「➕ 添加」记下第一个想吃的吧')+'</div>';
    return;
  }
  var html='';
  state.cats.concat(['__other']).forEach(function(cat){
    var group=items.filter(function(it){return cat==='__other'?state.cats.indexOf(it.cat)<0:it.cat===cat;});
    if(!group.length)return;
    html+='<div class="group-t">'+(cat==='__other'?'🍽️ 其他':emojiOf(cat)+' '+esc(cat))+' · '+group.length+'</div>';
    group.forEach(function(it){
      html+='<div class="item" onclick="editItem(\''+it.id+'\')">'
        +'<div class="info"><div class="nm">'+esc(it.name)+'</div>'
        +(it.src?'<div class="sb">'+esc(it.src)+'</div>':'')
        +((it.tags&&it.tags.length)?'<div class="tg">'+it.tags.map(function(t){return '<span>'+esc(t)+'</span>';}).join('')+'</div>':'')
        +'</div><button class="del" onclick="event.stopPropagation();delItem(\''+it.id+'\')">✕</button></div>';
    });
  });
  body.innerHTML=html;
}
function filterTag(t){listTagSel=(listTagSel===t?null:t);renderList();}
function delItem(id){
  var it=state.items.find(function(x){return x.id===id;});
  if(it&&confirm('删除「'+it.name+'」？')){
    state.items=state.items.filter(function(x){return x.id!==id;});
    save();renderList();
  }
}

/* ---------- 添加 / 编辑 ---------- */
function renderForm(){
  var fc=document.getElementById('fCats');
  fc.innerHTML=state.cats.map(function(c){
    return '<span class="chip'+(fSel.cat===c?' on':'')+'" onclick="setFCat(\''+esc(c)+'\')">'+emojiOf(c)+' '+esc(c)+'</span>';
  }).join('')+'<span class="chip add" onclick="addCat()">＋ 新分类</span>';
  var ft=document.getElementById('fTags');
  ft.innerHTML=state.tags.map(function(t){
    return '<span class="chip'+(fSel.tags.indexOf(t)>=0?' on':'')+'" onclick="toggleFTag(\''+esc(t)+'\')">'+esc(t)+'</span>';
  }).join('')+'<span class="chip add" onclick="addTag()">＋ 新标签</span>';
  document.getElementById('fSrcLabel').textContent=(fSel.cat==='零食'||fSel.cat==='饮品')?'牌子':'店名 / 牌子';
}
function setFCat(c){fSel.cat=c;renderForm();}
function toggleFTag(t){var i=fSel.tags.indexOf(t);if(i>=0)fSel.tags.splice(i,1);else fSel.tags.push(t);renderForm();}
function addCat(){var c=prompt('新分类名称：');if(c){c=c.trim();if(c&&state.cats.indexOf(c)<0){state.cats.push(c);save();}fSel.cat=c||fSel.cat;renderForm();}}
function addTag(){var t=prompt('新标签（如：下雨天想吃）：');if(t){t=t.trim();if(t&&state.tags.indexOf(t)<0){state.tags.push(t);save();}if(t&&fSel.tags.indexOf(t)<0)fSel.tags.push(t);renderForm();}}
function saveItem(){
  var name=document.getElementById('fName').value.trim();
  if(!name){alert('先写个名称吧～');return;}
  var data={name:name,cat:fSel.cat,src:document.getElementById('fSrc').value.trim(),
    tags:fSel.tags.slice(),note:document.getElementById('fNote').value.trim()};
  if(editingId){
    var it=state.items.find(function(x){return x.id===editingId;});
    if(it)Object.assign(it,data);
  }else{
    data.id=uid();data.at=Date.now();state.items.unshift(data);
  }
  save();resetForm();go('list');
}
function editItem(id){
  var it=state.items.find(function(x){return x.id===id;});
  if(!it)return;
  editingId=id;
  document.getElementById('fName').value=it.name;
  document.getElementById('fSrc').value=it.src||'';
  document.getElementById('fNote').value=it.note||'';
  fSel.cat=it.cat;fSel.tags=(it.tags||[]).slice();
  document.getElementById('saveBtn').textContent='保存修改 ✓';
  document.getElementById('cancelEditBtn').style.display='block';
  renderForm();go('add');
}
function resetForm(){
  editingId=null;
  document.getElementById('fName').value='';
  document.getElementById('fSrc').value='';
  document.getElementById('fNote').value='';
  fSel={cat:state.cats[0]||'正餐',tags:[]};
  document.getElementById('saveBtn').textContent='保存 ✓';
  document.getElementById('cancelEditBtn').style.display='none';
  renderForm();
}

/* ---------- 备份 ---------- */
function pad(n){return n<10?'0'+n:''+n;}
function dateStr(ts){var d=new Date(ts);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function exportData(){
  var json=JSON.stringify(state,null,2);
  var fname='吃什么备份-'+dateStr(Date.now())+'.json';
  var blob=new Blob([json],{type:'application/json'});
  var done=function(){state.lastBackup=Date.now();save();renderSet();renderPick();};
  try{
    var file=new File([blob],fname,{type:'application/json'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:fname}).then(done).catch(function(){});
      return;
    }
  }catch(e){}
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=fname;
  document.body.appendChild(a);a.click();a.remove();
  done();
}
function importData(input){
  var f=input.files&&input.files[0];
  if(!f)return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(!d||!Array.isArray(d.items))throw 0;
      if(!confirm('导入备份（'+d.items.length+' 条）将覆盖当前数据，确定吗？'))return;
      state=d;
      state.cats=state.cats&&state.cats.length?state.cats:['正餐','零食','饮品','甜品'];
      state.tags=state.tags||[];state.history=state.history||[];
      save();resetForm();renderSet();renderPick();
      alert('导入成功！共 '+state.items.length+' 条 🎉');
    }catch(e){alert('文件格式不对，请选择之前导出的备份文件');}
    input.value='';
  };
  r.readAsText(f);
}
function renderSet(){
  document.getElementById('statItems').textContent=state.items.length+' 条';
  document.getElementById('lastBackupTip').textContent=state.lastBackup?('上次备份：'+dateStr(state.lastBackup)):'还没有备份过';
  var h=document.getElementById('histList');
  h.innerHTML=state.history.length?state.history.slice(0,15).map(function(x){
    var d=new Date(x.at);
    return '<li>'+(d.getMonth()+1)+'月'+d.getDate()+'日 · '+esc(x.name)+'</li>';
  }).join(''):'<li>还没有记录，抽中后点「就它了」即可记录</li>';
}
function clearHistory(){if(confirm('清空「最近吃过」历史？')){state.history=[];save();renderSet();}}
function wipeAll(){
  if(confirm('⚠️ 将删除全部清单和历史，且无法恢复。确定吗？')&&confirm('真的确定吗？建议先下载备份！')){
    localStorage.removeItem(KEY);location.reload();
  }
}

/* ---------- 启动 ---------- */
resetForm();renderPick();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
